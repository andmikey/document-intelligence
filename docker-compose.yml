services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      # CORS_ORIGINS should include the frontend origin if accessed directly;
      # in this setup nginx proxies /api so the browser origin is the frontend host.
      CORS_ORIGINS: "http://localhost:3000"
    volumes:
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
